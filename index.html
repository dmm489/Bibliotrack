<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Sign In</title>
        <link rel="stylesheet" href="./style.css">
        <!-- Crimson Text font-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <!-- DM Sans Font-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body>

        <form action="login-form" action="#">
        <div class = "login-form">
            <div class = "container">
                <h1> Sign In </h1>
                <p>Enter your username or email</p>
                <div class="input-box">
                    <input type="email" name="email" placeholder="Email">
                </div>
                <p>Enter your password</p>
                <div class="input-box">
                    <input type="password" name="password" placeholder="Password">
                </div>
                <div class="checkbox">
                    <input type="checkbox"> Remember me?
                </div>
                <div class="button">
                    <button type="button">Sign In</button>
                </div>
                <div class="container-text">
                    Don't have an account? <a href="" class="link">Register</a>
                </div>
            </div>
        </div>
        </form>

        <form action="register-form" action="#">
            <div class = "register-form">
                <div class = "container">
                    <h1> Register </h1>
                    <div class="input-box">
                        <input type="email" name="email" placeholder="Email">
                    </div>
                    <div class="input-box">
                        <input type="password" name="password" placeholder="Password">
                    </div>
                    <div class="input-box">
                        <input type="password" name="confirm-password" placeholder="Confirm Password">
                    </div>
                    <div>
                        <button type="button">Register</button>
                    </div>
                    <div class="container-text">
                        Already have an account? <a href="" class="link">Sign In</a>
                    </div>
                </div>
            </div>
        </form>


    </body>
</html>
